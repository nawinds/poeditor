name: Release

on:
  release:
    types:
      - published

concurrency:
  group: marketplace-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Sign and publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: marketplace
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
      CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      PUBLISH_CHANNEL: ${{ vars.PUBLISH_CHANNEL }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify release version
        shell: bash
        run: |
          version="$(sed -n 's/^pluginVersion=//p' gradle.properties)"
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$version" != "$tag" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match pluginVersion=$version"
            exit 1
          fi

      - name: Test and verify
        run: ./gradlew clean test buildPlugin verifyPlugin

      - name: Sign plugin
        run: ./gradlew signPlugin

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin

      - name: Attach signed archive to GitHub release
        shell: bash
        run: |
          archive="$(find build/distributions -type f -name '*-signed.zip' -print -quit)"
          if [[ -z "$archive" ]]; then
            echo "Signed plugin archive was not found"
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "$archive" --clobber

