name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Test, build, and verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        run: ./gradlew test

      - name: Build plugin distribution
        run: ./gradlew buildPlugin

      - name: Verify plugin compatibility
        run: ./gradlew verifyPlugin

      - name: Upload plugin archive
        uses: actions/upload-artifact@v4
        with:
          name: po-editor-${{ github.sha }}
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload test and verifier reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.sha }}
          path: |
            build/reports/tests/
            build/reports/pluginVerifier/
          if-no-files-found: ignore

