name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve PO Editor. Please remove confidential text from sample catalogs.
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: ide-version
    attributes:
      label: IDE and version
      placeholder: IntelliJ IDEA 2026.1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Click…
        3. Observe…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal PO/POT or source sample
      render: text

